layout: {zmk_keyboard: kawvin_12}
layers:
  Qwerty:
  - HOME
  - UP
  - PG UP
  - LEFT
  - ENTER
  - RIGHT
  - END
  - DOWN
  - PG DN
  - TAB
  - {t: BSPC, h: Mouse}
  - {t: Number, h: toggle}
  Number:
  - '1'
  - '2'
  - '3'
  - '4'
  - '5'
  - '6'
  - '7'
  - '8'
  - '9'
  - '0'
  - KP DOT
  - {t: Mouse, h: toggle}
  Mouse:
  - '&mkp LCLK'
  - '&mmv MOVE_UP'
  - '&mkp RCLK'
  - '&mmv MOVE_LEFT'
  - ENTER
  - '&mmv MOVE_RIGHT'
  - {t: BT, h: '0'}
  - '&mmv MOVE_DOWN'
  - BT CLR
  - {t: BT, h: '1'}
  - {type: held}
  - {t: play, h: toggle}
  play:
  - {t: Ctl+LEFT, h: C}
  - UP ARROW
  - {t: Ctl+RIGHT, h: PG UP}
  - LEFT ARROW
  - SPACE
  - RIGHT
  - {t: Sft+LEFT, h: X}
  - DOWN ARROW
  - {t: Sft+RIGHT, h: PG DN}
  - {t: '1', h: E}
  - {t: ENTER, h: BACKSPACE}
  - {t: read, h: toggle}
  read:
  - HOME
  - UP ARROW
  - PG UP
  - LEFT ARROW
  - SPACE
  - RIGHT
  - END
  - DOWN ARROW
  - PG DN
  - ESC
  - ENTER
  - {t: control, h: toggle}
  control:
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {t: Qwerty, h: toggle}
combos:
- p: [0, 1]
  k: ESC
- p: [1, 2]
  k: ESC
- p: [2, 9]
  k: '&bootloader'
  l: [control]
