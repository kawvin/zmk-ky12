layout: {zmk_keyboard: kawvin_12}
layers:
  Qwerty:
  - HOME
  - UP
  - PG UP
  - LEFT
  - SPACE
  - RIGHT
  - END
  - DOWN
  - PG DN
  - TAB
  - {t: BSPC, h: Mouse}
  - {t: ENTER, h: Number}
  Number:
  - '1'
  - '2'
  - '3'
  - '4'
  - '5'
  - '6'
  - '7'
  - '8'
  - '9'
  - '0'
  - KP DOT
  - {type: held}
  Mouse:
  - '&mkp LCLK'
  - '&mmv MOVE_UP'
  - '&mkp RCLK'
  - '&mmv MOVE_LEFT'
  - ENTER
  - '&mmv MOVE_RIGHT'
  - {t: BT, h: '0'}
  - '&mmv MOVE_DOWN'
  - BT CLR
  - {t: BT, h: '1'}
  - {type: held}
  - {t: BT, h: '2'}
combos:
- p: [0, 1]
  k: ESC
- p: [1, 2]
  k: ESC
